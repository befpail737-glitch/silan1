<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="chipBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2c5282;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a365d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pinGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f4d03f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f7dc6f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4ac0d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dieSurface" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34495e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c3e50;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    <pattern id="circuitPattern" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M0,10 L10,10 L10,0 M10,10 L20,10 M10,10 L10,20" stroke="#4a90a4" stroke-width="0.5" fill="none" opacity="0.3"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="#f8f9fa"/>
  
  <!-- Product Card Background -->
  <rect x="50" y="40" width="300" height="220" rx="12" fill="white" filter="url(#shadow)"/>
  
  <!-- MCU Package (LQFP48 style) -->
  <g transform="translate(150, 90)">
    <!-- Package body -->
    <rect x="0" y="0" width="100" height="100" rx="3" fill="url(#chipBody)" stroke="#1a365d" stroke-width="2"/>
    
    <!-- Circuit pattern overlay -->
    <rect x="5" y="5" width="90" height="90" fill="url(#circuitPattern)" opacity="0.5"/>
    
    <!-- Inner die area -->
    <rect x="20" y="20" width="60" height="60" rx="2" fill="url(#dieSurface)" stroke="#4a90a4" stroke-width="1"/>
    
    <!-- Die details -->
    <rect x="30" y="35" width="15" height="10" fill="#5dade2" opacity="0.6"/>
    <rect x="50" y="35" width="20" height="10" fill="#5dade2" opacity="0.6"/>
    <rect x="30" y="50" width="25" height="8" fill="#5dade2" opacity="0.6"/>
    <rect x="60" y="50" width="12" height="8" fill="#5dade2" opacity="0.6"/>
    <rect x="35" y="62" width="30" height="6" fill="#5dade2" opacity="0.6"/>
    
    <!-- Pin 1 indicator (dot) -->
    <circle cx="10" cy="10" r="4" fill="#e74c3c"/>
    
    <!-- Top pins -->
    <g id="topPins">
      <rect x="15" y="-8" width="3" height="10" fill="url(#pinGold)" stroke="#b7950b" stroke-width="0.5"/>
      <rect x="25" y="-8" width="3" height="10" fill="url(#pinGold)" stroke="#b7950b" stroke-width="0.5"/>
      <rect x="35" y="-8" width="3" height="10" fill="url(#pinGold)" stroke="#b7950b" stroke-width="0.5"/>
      <rect x="45" y="-8" width="3" height="10" fill="url(#pinGold)" stroke="#b7950b" stroke-width="0.5"/>
      <rect x="55" y="-8" width="3" height="10" fill="url(#pinGold)" stroke="#b7950b" stroke-width="0.5"/>
      <rect x="65" y="-8" width="3" height="10" fill="url(#pinGold)" stroke="#b7950b" stroke-width="0.5"/>
      <rect x="75" y="-8" width="3" height="10" fill="url(#pinGold)" stroke="#b7950b" stroke-width="0.5"/>
      <rect x="85" y="-8" width="3" height="10" fill="url(#pinGold)" stroke="#b7950b" stroke-width="0.5"/>
    </g>
    
    <!-- Bottom pins -->
    <g id="bottomPins">
      <rect x="15" y="98" width="3" height="10" fill="url(#pinGold)" stroke="#b7950b" stroke-width="0.5"/>
      <rect x="25" y="98" width="3" height="10" fill="url(#pinGold)" stroke="#b7950b" stroke-width="0.5"/>
      <rect x="35" y="98" width="3" height="10" fill="url(#pinGold)" stroke="#b7950b" stroke-width="0.5"/>
      <rect x="45" y="98" width="3" height="10" fill="url(#pinGold)" stroke="#b7950b" stroke-width="0.5"/>
      <rect x="55" y="98" width="3" height="10" fill="url(#pinGold)" stroke="#b7950b" stroke-width="0.5"/>
      <rect x="65" y="98" width="3" height="10" fill="url(#pinGold)" stroke="#b7950b" stroke-width="0.5"/>
      <rect x="75" y="98" width="3" height="10" fill="url(#pinGold)" stroke="#b7950b" stroke-width="0.5"/>
      <rect x="85" y="98" width="3" height="10" fill="url(#pinGold)" stroke="#b7950b" stroke-width="0.5"/>
    </g>
    
    <!-- Left pins -->
    <g id="leftPins">
      <rect x="-8" y="15" width="10" height="3" fill="url(#pinGold)" stroke="#b7950b" stroke-width="0.5"/>
      <rect x="-8" y="25" width="10" height="3" fill="url(#pinGold)" stroke="#b7950b" stroke-width="0.5"/>
      <rect x="-8" y="35" width="10" height="3" fill="url(#pinGold)" stroke="#b7950b" stroke-width="0.5"/>
      <rect x="-8" y="45" width="10" height="3" fill="url(#pinGold)" stroke="#b7950b" stroke-width="0.5"/>
      <rect x="-8" y="55" width="10" height="3" fill="url(#pinGold)" stroke="#b7950b" stroke-width="0.5"/>
      <rect x="-8" y="65" width="10" height="3" fill="url(#pinGold)" stroke="#b7950b" stroke-width="0.5"/>
      <rect x="-8" y="75" width="10" height="3" fill="url(#pinGold)" stroke="#b7950b" stroke-width="0.5"/>
      <rect x="-8" y="85" width="10" height="3" fill="url(#pinGold)" stroke="#b7950b" stroke-width="0.5"/>
    </g>
    
    <!-- Right pins -->
    <g id="rightPins">
      <rect x="98" y="15" width="10" height="3" fill="url(#pinGold)" stroke="#b7950b" stroke-width="0.5"/>
      <rect x="98" y="25" width="10" height="3" fill="url(#pinGold)" stroke="#b7950b" stroke-width="0.5"/>
      <rect x="98" y="35" width="10" height="3" fill="url(#pinGold)" stroke="#b7950b" stroke-width="0.5"/>
      <rect x="98" y="45" width="10" height="3" fill="url(#pinGold)" stroke="#b7950b" stroke-width="0.5"/>
      <rect x="98" y="55" width="10" height="3" fill="url(#pinGold)" stroke="#b7950b" stroke-width="0.5"/>
      <rect x="98" y="65" width="10" height="3" fill="url(#pinGold)" stroke="#b7950b" stroke-width="0.5"/>
      <rect x="98" y="75" width="10" height="3" fill="url(#pinGold)" stroke="#b7950b" stroke-width="0.5"/>
      <rect x="98" y="85" width="10" height="3" fill="url(#pinGold)" stroke="#b7950b" stroke-width="0.5"/>
    </g>
    
    <!-- Label -->
    <text x="50" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#2c3e50">SC32F10</text>
  </g>
  
  <!-- Product Info -->
  <text x="200" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">SC32F10</text>
  <text x="200" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">32-bit ARM Cortex-M0 MCU</text>
  <text x="200" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#95a5a6">64KB Flash | 8KB SRAM | LQFP48</text>
  
  <!-- Feature badges -->
  <g transform="translate(60, 200)">
    <rect x="0" y="0" width="55" height="18" rx="9" fill="#9b59b6"/>
    <text x="27.5" y="12" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white" font-weight="bold">Cortex-M0</text>
  </g>
  
  <g transform="translate(120, 200)">
    <rect x="0" y="0" width="50" height="18" rx="9" fill="#e74c3c"/>
    <text x="25" y="12" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white" font-weight="bold">64KB</text>
  </g>
  
  <g transform="translate(175, 200)">
    <rect x="0" y="0" width="50" height="18" rx="9" fill="#3498db"/>
    <text x="25" y="12" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white" font-weight="bold">48MHz</text>
  </g>
  
  <g transform="translate(230, 200)">
    <rect x="0" y="0" width="50" height="18" rx="9" fill="#27ae60"/>
    <text x="25" y="12" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white" font-weight="bold">MCU</text>
  </g>
  
  <g transform="translate(285, 200)">
    <rect x="0" y="0" width="55" height="18" rx="9" fill="#f39c12"/>
    <text x="27.5" y="12" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white" font-weight="bold">In Stock</text>
  </g>
</svg>