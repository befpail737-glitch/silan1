<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bodyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c3e50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a252f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="metalGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c0c0c0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e8e8e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a0a0a0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pinGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f4d03f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f7dc6f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4ac0d;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="#f8f9fa"/>
  
  <!-- Product Card Background -->
  <rect x="50" y="40" width="300" height="220" rx="12" fill="white" filter="url(#shadow)"/>
  
  <!-- IGBT Package Body (TO-247 style) -->
  <g transform="translate(150, 80)">
    <!-- Main body -->
    <rect x="0" y="20" width="100" height="80" rx="4" fill="url(#bodyGradient)" stroke="#34495e" stroke-width="2"/>
    
    <!-- Metal back plate -->
    <rect x="-8" y="15" width="116" height="90" rx="2" fill="none" stroke="#95a5a6" stroke-width="3"/>
    <rect x="-5" y="18" width="110" height="84" rx="1" fill="url(#metalGradient)" opacity="0.3"/>
    
    <!-- Mounting hole -->
    <circle cx="50" cy="105" r="8" fill="#34495e" stroke="#7f8c8d" stroke-width="2"/>
    <circle cx="50" cy="105" r="4" fill="#2c3e50"/>
    
    <!-- Pins -->
    <g id="pins">
      <!-- Pin 1 (Gate) -->
      <rect x="15" y="100" width="12" height="40" fill="url(#pinGradient)" stroke="#b7950b" stroke-width="1"/>
      <rect x="13" y="95" width="16" height="8" rx="2" fill="#2c3e50"/>
      
      <!-- Pin 2 (Collector) -->
      <rect x="44" y="100" width="12" height="40" fill="url(#pinGradient)" stroke="#b7950b" stroke-width="1"/>
      <rect x="42" y="95" width="16" height="8" rx="2" fill="#2c3e50"/>
      
      <!-- Pin 3 (Emitter) -->
      <rect x="73" y="100" width="12" height="40" fill="url(#pinGradient)" stroke="#b7950b" stroke-width="1"/>
      <rect x="71" y="95" width="16" height="8" rx="2" fill="#2c3e50"/>
    </g>
    
    <!-- Label on package -->
    <text x="50" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ecf0f1">SGT40N60NPF</text>
    <text x="50" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#bdc3c7">Silan IGBT</text>
    <text x="50" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#95a5a6">40A 600V</text>
  </g>
  
  <!-- Product Info -->
  <text x="200" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">SGT40N60NPF</text>
  <text x="200" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">40A 600V Trench Field Stop IGBT</text>
  <text x="200" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#95a5a6">TO-247 Package</text>
  
  <!-- Feature badges -->
  <g transform="translate(60, 180)">
    <rect x="0" y="0" width="50" height="18" rx="9" fill="#e74c3c"/>
    <text x="25" y="12" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white" font-weight="bold">40A</text>
  </g>
  
  <g transform="translate(115, 180)">
    <rect x="0" y="0" width="50" height="18" rx="9" fill="#3498db"/>
    <text x="25" y="12" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white" font-weight="bold">600V</text>
  </g>
  
  <g transform="translate(235, 180)">
    <rect x="0" y="0" width="50" height="18" rx="9" fill="#27ae60"/>
    <text x="25" y="12" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white" font-weight="bold">IGBT</text>
  </g>
  
  <g transform="translate(290, 180)">
    <rect x="0" y="0" width="50" height="18" rx="9" fill="#f39c12"/>
    <text x="25" y="12" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white" font-weight="bold">In Stock</text>
  </g>
</svg>