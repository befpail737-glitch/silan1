<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="interiorBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ecf0f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bdc3c7;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Warehouse Interior Background -->
  <rect x="0" y="0" width="600" height="400" fill="url(#interiorBg)"/>
  
  <!-- Ceiling Structure -->
  <line x1="0" y1="50" x2="600" y2="50" stroke="#7f8c8d" stroke-width="3"/>
  <line x1="0" y1="100" x2="600" y2="100" stroke="#95a5a6" stroke-width="2"/>
  <line x1="100" y1="0" x2="100" y2="100" stroke="#7f8c8d" stroke-width="2"/>
  <line x1="300" y1="0" x2="300" y2="100" stroke="#7f8c8d" stroke-width="2"/>
  <line x1="500" y1="0" x2="500" y2="100" stroke="#7f8c8d" stroke-width="2"/>
  
  <!-- Floor -->
  <rect x="0" y="350" width="600" height="50" fill="#7f8c8d"/>
  
  <!-- Shelving Units -->
  <rect x="50" y="150" width="20" height="200" fill="#34495e"/>
  <rect x="150" y="150" width="20" height="200" fill="#34495e"/>
  <line x1="50" y1="180" x2="170" y2="180" stroke="#2c3e50" stroke-width="3"/>
  <line x1="50" y1="220" x2="170" y2="220" stroke="#2c3e50" stroke-width="3"/>
  <line x1="50" y1="260" x2="170" y2="260" stroke="#2c3e50" stroke-width="3"/>
  <line x1="50" y1="300" x2="170" y2="300" stroke="#2c3e50" stroke-width="3"/>
  
  <!-- Boxes on Shelves -->
  <rect x="80" y="190" width="25" height="20" fill="#e74c3c"/>
  <rect x="110" y="190" width="25" height="20" fill="#f39c12"/>
  <rect x="80" y="230" width="25" height="20" fill="#27ae60"/>
  <rect x="110" y="230" width="25" height="20" fill="#3498db"/>
  
  <!-- More Shelving -->
  <rect x="450" y="150" width="20" height="200" fill="#34495e"/>
  <rect x="550" y="150" width="20" height="200" fill="#34495e"/>
  <line x1="450" y1="180" x2="570" y2="180" stroke="#2c3e50" stroke-width="3"/>
  <line x1="450" y1="220" x2="570" y2="220" stroke="#2c3e50" stroke-width="3"/>
  <line x1="450" y1="260" x2="570" y2="260" stroke="#2c3e50" stroke-width="3"/>
  
  <!-- Pallets -->
  <rect x="250" y="320" width="40" height="30" fill="#8b4513"/>
  <rect x="260" y="310" width="20" height="15" fill="#e74c3c"/>
  
  <rect x="320" y="320" width="40" height="30" fill="#8b4513"/>
  <rect x="330" y="310" width="20" height="15" fill="#3498db"/>
  
  <!-- Forklift -->
  <rect x="200" y="280" width="80" height="40" fill="#f39c12"/>
  <rect x="270" y="250" width="10" height="70" fill="#2c3e50"/>
  <rect x="275" y="240" width="30" height="10" fill="#7f8c8d"/>
  <circle cx="220" cy="320" r="15" fill="#2c3e50"/>
  <circle cx="260" cy="320" r="15" fill="#2c3e50"/>
  
  <!-- Worker -->
  <circle cx="400" cy="250" r="12" fill="#f5b7b1"/>
  <rect x="390" y="265" width="20" height="30" fill="#3498db"/>
  <rect x="385" y="295" width="8" height="25" fill="#2c3e50"/>
  <rect x="407" y="295" width="8" height="25" fill="#2c3e50"/>
  
  <!-- Labels -->
  <text x="300" y="380" text-anchor="middle" fill="#2c3e50" font-family="Arial, sans-serif" font-size="12" font-weight="bold">LA WAREHOUSE - INVENTORY MANAGEMENT</text>
</svg>