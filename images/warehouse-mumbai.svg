<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="skyMumbai" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9933;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#138808;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="buildingMumbai" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E67E22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D35400;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Sky -->
  <rect x="0" y="0" width="600" height="250" fill="url(#skyMumbai)"/>
  
  <!-- Ground -->
  <rect x="0" y="250" width="600" height="150" fill="#D4A574"/>
  
  <!-- Warehouse Building -->
  <rect x="100" y="130" width="400" height="160" fill="url(#buildingMumbai)"/>
  
  <!-- Indian Style Roof -->
  <polygon points="80,130 300,70 520,130" fill="#A04000"/>
  <polygon points="90,130 300,80 510,130" fill="#D35400"/>
  
  <!-- Arched Doorways -->
  <path d="M150 290 L150 220 Q190 200 230 220 L230 290 Z" fill="#5D4037"/>
  <path d="M260 290 L260 220 Q300 200 340 220 L340 290 Z" fill="#5D4037"/>
  <path d="M370 290 L370 220 Q410 200 450 220 L450 290 Z" fill="#5D4037"/>
  
  <!-- Company Sign -->
  <rect x="180" y="150" width="240" height="35" fill="#1A5276" rx="3"/>
  <text x="300" y="173" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="15" font-weight="bold">LITONG MUMBAI</text>
  
  <!-- Indian Truck (Tata Style) -->
  <rect x="40" y="280" width="130" height="55" fill="#E74C3C" rx="5"/>
  <rect x="140" y="288" width="45" height="40" fill="#F39C12" rx="3"/>
  <circle cx="65" cy="335" r="14" fill="#2C3E50"/>
  <circle cx="125" cy="335" r="14" fill="#2C3E50"/>
  <text x="105" y="315" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="9">भारत लॉजिस्टिक्स</text>
  
  <!-- Indian Flag -->
  <rect x="520" y="160" width="50" height="10" fill="#FF9933"/>
  <rect x="520" y="170" width="50" height="10" fill="#FFFFFF"/>
  <rect x="520" y="180" width="50" height="10" fill="#138808"/>
  <circle cx="545" cy="175" r="4" fill="#000080"/>
  
  <!-- Location Pin -->
  <circle cx="300" cy="100" r="20" fill="#E74C3C"/>
  <circle cx="300" cy="96" r="8" fill="white"/>
  <text x="300" y="140" text-anchor="middle" fill="#2C3E50" font-family="Arial, sans-serif" font-size="12" font-weight="bold">MUMBAI, INDIA</text>
  
  <!-- Palm Trees -->
  <rect x="480" y="220" width="8" height="80" fill="#8B4513"/>
  <ellipse cx="484" cy="210" rx="30" ry="15" fill="#228B22"/>
  <ellipse cx="484" cy="210" rx="15" ry="30" fill="#228B22"/>
  
  <rect x="530" y="240" width="6" height="60" fill="#8B4513"/>
  <ellipse cx="533" cy="230" rx="25" ry="12" fill="#228B22"/>
</svg>