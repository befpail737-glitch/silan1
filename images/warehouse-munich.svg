<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="skyMunich" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#B8D4E3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8F4F8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="buildingMunich" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7F8C8D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#566573;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Sky -->
  <rect x="0" y="0" width="600" height="250" fill="url(#skyMunich)"/>
  
  <!-- Mountains (Bavarian Alps style) -->
  <polygon points="0,250 100,150 200,200 300,120 400,180 500,140 600,200 600,250" fill="#85929E"/>
  <polygon points="0,250 80,180 160,220 240,160 320,200 400,170 480,210 560,190 600,220 600,250" fill="#AEB6BF"/>
  
  <!-- Ground -->
  <rect x="0" y="250" width="600" height="150" fill="#7DCEA0"/>
  
  <!-- Warehouse Building -->
  <rect x="120" y="140" width="360" height="140" fill="url(#buildingMunich)"/>
  
  <!-- German Style Roof -->
  <polygon points="100,140 300,80 500,140" fill="#2C3E50"/>
  
  <!-- Large Loading Bay -->
  <rect x="150" y="200" width="300" height="80" fill="#1C2833"/>
  <rect x="160" y="210" width="80" height="60" fill="#2E4053"/>
  <rect x="260" y="210" width="80" height="60" fill="#2E4053"/>
  <rect x="360" y="210" width="80" height="60" fill="#2E4053"/>
  
  <!-- Company Sign -->
  <rect x="200" y="160" width="200" height="30" fill="#1A5276" rx="3"/>
  <text x="300" y="180" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">LITONG MUNICH</text>
  
  <!-- European Truck -->
  <rect x="30" y="270" width="140" height="50" fill="#3498DB" rx="5"/>
  <rect x="150" y="275" width="35" height="40" fill="#F1C40F" rx="3"/>
  <circle cx="60" cy="320" r="12" fill="#2C3E50"/>
  <circle cx="120" cy="320" r="12" fill="#2C3E50"/>
  <text x="100" y="300" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="9">EU LOGISTICS</text>
  
  <!-- German Flag -->
  <rect x="500" y="160" width="60" height="12" fill="#000"/>
  <rect x="500" y="172" width="60" height="12" fill="#DD0000"/>
  <rect x="500" y="184" width="60" height="12" fill="#FFCE00"/>
  
  <!-- Location Pin -->
  <circle cx="300" cy="100" r="18" fill="#E74C3C"/>
  <circle cx="300" cy="96" r="7" fill="white"/>
  <text x="300" y="135" text-anchor="middle" fill="#2C3E50" font-family="Arial, sans-serif" font-size="11" font-weight="bold">MUNICH, GERMANY</text>
  
  <!-- Trees -->
  <polygon points="480,250 500,200 520,250" fill="#228B22"/>
  <polygon points="520,250 540,190 560,250" fill="#228B22"/>
  <polygon points="560,250 580,210 600,250" fill="#228B22"/>
</svg>